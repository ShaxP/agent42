name: Snape AI Review

# This workflow is the mandatory PR approval gate.
# It replaces human reviewer approval with an AI (OpenAI) code review.
# The status check "snape-review" must pass for any PR to merge into main.
#
# Required secret: OPENAI_API_KEY
# If the secret is absent the check fails CLOSED — merges are blocked, not bypassed.

on:
  pull_request:
    branches: [main, dev, preview, insider]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  snape-review:
    name: snape-review
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed — verify OPENAI_API_KEY is present
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured."
            echo "::error::Add it in Settings → Secrets → Actions before any PR can merge."
            echo "::error::Merges are BLOCKED until this is resolved (fail-closed policy)."
            exit 1
          fi
          echo "✅ OPENAI_API_KEY is present."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR base and head refs
        run: |
          git fetch origin ${{ github.base_ref }}
          git fetch origin ${{ github.head_ref }}

      - name: Build diff for AI review
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} -- . \
            ':(exclude).squad/' \
            ':(exclude).copilot/' \
            ':(exclude)package-lock.json' \
            ':(exclude)pnpm-lock.yaml' \
            ':(exclude)yarn.lock' \
            | head -c 28000)
          # Store in env file to avoid shell quoting issues with newlines
          printf '%s' "$DIFF" > pr_diff.txt
          echo "Diff size: $(wc -c < pr_diff.txt) bytes"

      - name: Call OpenAI for code review
        id: ai_review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.head_ref }}
          BASE_BRANCH: ${{ github.base_ref }}
        run: |
          DIFF_CONTENT=$(cat pr_diff.txt)

          SYSTEM_PROMPT="You are Snape, a rigorous merge gate reviewer. Return a JSON object with exactly two keys: \"verdict\" (string, either \"PASS\" or \"FAIL\") and \"reasoning\" (string, max 400 words). Use FAIL only for merge-critical findings: correctness bugs, security/privacy issues, broken CI/build behavior, data loss/corruption risk, or other defects that make merge unsafe right now. Use PASS when issues are non-blocking or process-oriented, and include those as advisory improvements in reasoning. Examples of advisory-only feedback: optional backup reviewer suggestions, extra PR template sections, naming/style preferences, refactor ideas, or workflow flexibility suggestions. If the diff is empty, FAIL with a note that there is nothing to review."

          USER_PROMPT="PR #${PR_NUMBER}: ${PR_TITLE}\nBranch: ${HEAD_BRANCH} → ${BASE_BRANCH}\n\nDiff:\n${DIFF_CONTENT}"

          RESPONSE=$(curl -sf https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg system "$SYSTEM_PROMPT" \
              --arg user "$USER_PROMPT" \
              '{
                model: "gpt-4o",
                temperature: 0.2,
                response_format: {type: "json_object"},
                messages: [
                  {role: "system", content: $system},
                  {role: "user", content: $user}
                ]
              }')")

          if [ $? -ne 0 ] || [ -z "$RESPONSE" ]; then
            echo "::error::OpenAI API call failed. Failing closed — check API key validity and rate limits."
            echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
            echo 'reasoning=AI review could not be completed — OpenAI API call failed. Merges are blocked until the reviewer gate is operational.' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERDICT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content | fromjson | .verdict' 2>/dev/null || echo "FAIL")
          REASONING=$(echo "$RESPONSE" | jq -r '.choices[0].message.content | fromjson | .reasoning' 2>/dev/null || echo "Failed to parse AI response.")

          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          # Escape newlines for GITHUB_OUTPUT multiline
          REASONING_ESCAPED="${REASONING//$'\n'/'%0A'}"
          echo "reasoning=${REASONING_ESCAPED}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with review verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERDICT: ${{ steps.ai_review.outputs.verdict }}
          REASONING: ${{ steps.ai_review.outputs.reasoning }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          REASONING_DECODED="${REASONING//'%0A'/$'\n'}"

          if [ "$VERDICT" = "PASS" ]; then
            ICON="✅"
            SUMMARY="**Snape Review: PASS** — This PR is approved by the AI reviewer."
          else
            ICON="❌"
            SUMMARY="**Snape Review: FAIL** — This PR does not meet merge standards."
          fi

          {
            printf '%s %s\n\n---\n\n' "$ICON" "$SUMMARY"
            printf '%s\n\n---\n' "$REASONING_DECODED"
            printf '%s\n' '*Reviewed by Snape (AI reviewer). Approval policy: AI-gated — no human approvals required.*'
          } > review_comment.md

          gh pr comment "$PR_NUMBER" --body-file review_comment.md

      - name: Enforce verdict — fail the check if AI said FAIL
        env:
          VERDICT: ${{ steps.ai_review.outputs.verdict }}
        run: |
          if [ "$VERDICT" != "PASS" ]; then
            echo "::error::Snape review returned FAIL due to merge-critical findings."
            exit 1
          fi
          echo "✅ Snape review passed. Any non-critical feedback is advisory."
