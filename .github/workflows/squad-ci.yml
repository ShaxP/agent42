name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  validate-branch:
    name: Validate branch conventions
    runs-on: ubuntu-latest
    steps:
      - name: Enforce branch-per-feature naming
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ -z "$BRANCH" ]]; then
            echo "ℹ️ Push event — branch naming check skipped."
            exit 0
          fi
          # Reject PRs opened directly from a protected branch
          if [[ "$BRANCH" == "main" || "$BRANCH" == "dev" || "$BRANCH" == "preview" || "$BRANCH" == "insider" ]]; then
            echo "::error::Direct PR from protected branch '$BRANCH' is not allowed. Open a feature branch first."
            exit 1
          fi
          # Require a scoped prefix so every branch has an explicit intent
          if ! [[ "$BRANCH" =~ ^(feat|fix|chore|refactor|docs|test|ci)/ ]]; then
            echo "::error::Branch '$BRANCH' does not follow naming convention."
            echo "::error::Expected prefix: feat/, fix/, chore/, refactor/, docs/, test/, or ci/"
            exit 1
          fi
          echo "✅ Branch '$BRANCH' satisfies branch-per-feature convention."

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify required docs exist
        run: |
          set -euo pipefail

          required_docs=(
            docs/01-product-overview.md
            docs/02-ui-description.md
            docs/03-user-flows.md
            docs/04-technical-architecture.md
            docs/05-tech-stack.md
            docs/06-squad-integration.md
            docs/07-auth-strategy.md
            docs/08-repo-management.md
            docs/09-data-models.md
            docs/10-development-workflow.md
          )

          for file in "${required_docs[@]}"; do
            if [ ! -s "$file" ]; then
              echo "::error::Required document missing or empty: $file"
              exit 1
            fi
          done

          echo "✅ Required docs are present."

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
