name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  validate-branch:
    name: Validate branch conventions
    runs-on: ubuntu-latest
    steps:
      - name: Enforce branch-per-feature naming
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ -z "$BRANCH" ]]; then
            echo "ℹ️ Push event — branch naming check skipped."
            exit 0
          fi
          # Reject PRs opened directly from a protected branch
          if [[ "$BRANCH" == "main" || "$BRANCH" == "dev" || "$BRANCH" == "preview" || "$BRANCH" == "insider" ]]; then
            echo "::error::Direct PR from protected branch '$BRANCH' is not allowed. Open a feature branch first."
            exit 1
          fi
          # Require a scoped prefix so every branch has an explicit intent
          if ! [[ "$BRANCH" =~ ^(feat|fix|chore|refactor|docs|test|ci)/ ]]; then
            echo "::error::Branch '$BRANCH' does not follow naming convention."
            echo "::error::Expected prefix: feat/, fix/, chore/, refactor/, docs/, test/, or ci/"
            exit 1
          fi
          echo "✅ Branch '$BRANCH' satisfies branch-per-feature convention."

  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          # ⚠️ No build commands are configured yet.
          # Add the appropriate commands for this project before any PR can merge:
          #   Tauri/Rust:  cargo test --manifest-path src-tauri/Cargo.toml
          #   Node/TS:     npm ci && npm test
          #   Go:          go test ./...
          #   Python:      pip install -r requirements.txt && pytest
          echo "::error::Build and test commands are not configured. Update squad-ci.yml with real commands."
          exit 1
